<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Birthday Letter</title>

<style>

/*=========================
RESET
=========================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/*=========================
BACKGROUND
=========================*/

body{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.background{
    position:fixed;
    inset:0;
    z-index:1;
}

.background img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.35);
    z-index:2;
}

/*=========================
LETTER BOX
=========================*/

.letter-box{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:20px;

}

.letter{

    font-size:95px;

    cursor:pointer;

    user-select:none;

    animation:
    floating 3s ease-in-out infinite;

}

h1{

    color:#fff;

    font-size:34px;

    text-shadow:
    0 0 15px rgba(255,255,255,.4);

}

p{

    color:#eee;

    font-size:16px;

    text-align:center;

    max-width:320px;

    line-height:1.6;

}

/*=========================
BUTTON
=========================*/

button{

    width:220px;

    height:52px;

    border:none;

    border-radius:14px;

    background:#fff;

    color:#111;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

    outline:none;

    -webkit-tap-highlight-color:transparent;

}

button:hover{

    transform:translateY(-2px);

}

button:active{

    transform:scale(.94);

}

/*=========================
FLASH
=========================*/

.flash{

    position:fixed;

    inset:0;

    background:#fff;

    opacity:0;

    pointer-events:none;

    z-index:999;

}

/*=========================
ANIMATION
=========================*/

@keyframes floating{

    0%,100%{

        transform:translateY(0);

    }

    50%{

        transform:translateY(-12px);

    }

}

  p{
    display:none;
  }

  /*=========================
WHITE PARTICLES
=========================*/

.particles{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:2;

}

.particle{

    position:absolute;

    width:3px;

    height:3px;

    border-radius:50%;

    background:#fff;

    opacity:.75;

    box-shadow:
        0 0 6px rgba(255,255,255,.9);

    animation:
        move linear infinite,
        blink ease-in-out infinite;

}

@keyframes move{

    0%{

        transform:
        translate(0,0);

    }

    25%{

        transform:
        translate(35px,-25px);

    }

    50%{

        transform:
        translate(-20px,-60px);

    }

    75%{

        transform:
        translate(20px,-100px);

    }

    100%{

        transform:
        translate(-15px,-140px);

    }

}

@keyframes blink{

    0%,100%{

        opacity:.15;

        transform:scale(.8);

    }

    50%{

        opacity:1;

        transform:scale(1.5);

    }

  }
</style>

</head>
<body>

  <div class="particles" id="particles"></div>

<div class="background">

    <img src="src/Aw.jpg" alt="Background">

</div>

<div class="overlay">

    <div class="letter-box">

        <div class="letter" id="letter">
            💌
        </div>

        <p>
            Ada sebuah pesan spesial yang menunggumu.
        </p>

        <button id="openBtn">
            Buka
        </button>

    </div>

</div>

<div class="flash" id="flash"></div>

<script>

/*=========================
ELEMENT
=========================*/

const letter = document.getElementById("letter");

const openBtn = document.getElementById("openBtn");

const flash = document.getElementById("flash");

/*=========================
GETAR SURAT
=========================*/

const shake = [

    {transform:"translate(0px,0px) rotate(0deg)"},

    {transform:"translate(-4px,2px) rotate(-3deg)"},

    {transform:"translate(4px,-2px) rotate(3deg)"},

    {transform:"translate(-3px,-1px) rotate(-2deg)"},

    {transform:"translate(3px,2px) rotate(2deg)"},

    {transform:"translate(0px,0px) rotate(0deg)"}

];

/*=========================
BUKA
=========================*/

openBtn.addEventListener("click",()=>{

    openBtn.disabled=true;

    letter.animate(

        shake,

        {

            duration:450,

            iterations:2

        }

    );

    setTimeout(()=>{

        flash.style.transition="opacity .35s";

        flash.style.opacity="1";

    },420);

    setTimeout(()=>{

        sessionStorage.setItem("playMusic","true");

window.location.href="index2.html";
      
    },780);

});

  /*=========================
WHITE PARTICLES
=========================*/

const particles=document.getElementById("particles");

for(let i=0;i<45;i++){

    const p=document.createElement("div");

    p.className="particle";

    const size=Math.random()*3+1;

    p.style.width=size+"px";
    p.style.height=size+"px";

    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";

    p.style.animationDuration=
        (8+Math.random()*8)+"s,"+
        (2+Math.random()*2)+"s";

    p.style.animationDelay=
        (-Math.random()*15)+"s";

    particles.appendChild(p);

}

</script>

</body>
</html>
